<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Thread - Indira ❤️</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@400;600&family=Sriracha&display=swap" rel="stylesheet">
<link rel="stylesheet" href="page3.css">
</head>
<body>

<div class="floating-hearts" id="heartsContainer"></div>
<div class="flying-birds" id="birdsContainer"></div>

<div class="header">
    <h1><i class="fas fa-images"></i> Through These Moments <i class="fas fa-images"></i></h1>
    <p>Every picture has its own little story. 🌸</p>
</div>

<!-- the connecting thread -->
<svg class="thread-svg" id="threadSvg" preserveAspectRatio="none">
  <path id="threadPath" d="" />
</svg>

<div class="timeline" id="timeline">
  <!-- injected by JS -->
</div>

<div class="finish-note">
    <div class="note-box">
        <h3>✨ Almost There</h3>
        <p>One final page... and I promise it's worth it.</p>

        <button id="continueBtn" class="continue-btn">
            Next <i class="fas fa-arrow-right"></i>
        </button>
    </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose"><i class="fas fa-times"></i></button>
  <div class="lightbox-content"><img src="" id="lightboxImage" alt=""></div>
</div>

<audio id="bgMusic" autoplay loop preload="auto">
  <source src="assets/audio/Gundelona Gundelona Song Whatsapp Status🥰.mp3" type="audio/mpeg">
</audio>

<script src="page3.js"></script>
</body>
</html>
